<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Workspace Sidebar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tilt+Neon&display=swap');

        :root {
            --bg-color: #2d2d2d;
            --text-color: #fefefe;
            --accent-color: #abe1f3;
            --hover-color: #3A3A3A;
            --border-color: #444444;
            --secondary-bg: #353535;
            --secondary-text: #444444;
            --pressed-color: #4A4A4A;
        }


        html.theme-light {
            --bg-color: #F5F5F5;
            --text-color: #000000;
            --accent-color: #0066CC;
            --hover-color: #E0E0E0;
            --border-color: #CCCCCC;
            --secondary-bg: #FFFFFF;
            --secondary-text: #666666;
            --pressed-color: #D0D0D0;
        }


        html.theme-blue {
            --bg-color: #1a2f4a;
            --text-color: #E6F3FF;
            --accent-color: #66B2FF;
            --hover-color: #2a4a6f;
            --border-color: #4a7db8;
            --secondary-bg: #1e3a5f;
            --secondary-text: #5a8fb8;
            --pressed-color: #3a5a7f;
        }

        html.theme-green {
            --bg-color: #153f26;
            --text-color: #E6FFE6;
            --accent-color: #66FF66;
            --hover-color: #2a5a3a;
            --border-color: #4ab84a;
            --secondary-bg: #1a4a2e;
            --secondary-text: #5ab85a;
            --pressed-color: #3a6a4a;
        }


        html.theme-purple {
            --bg-color: #3f153f;
            --text-color: #FFE6FF;
            --accent-color: #BB66FF;
            --hover-color: #5a2a5a;
            --border-color: #b84ab8;
            --secondary-bg: #4a1a4a;
            --secondary-text: #b85ab8;
            --pressed-color: #6a3a6a;
        }

        html.theme-red {
            --bg-color: #3f1515;
            --text-color: #FFE6E6;
            --accent-color: #FF6666;
            --hover-color: #5a2a2a;
            --border-color: #b84a4a;
            --secondary-bg: #4a1a1a;
            --secondary-text: #b85a5a;
            --pressed-color: #6a3a3a;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Tilt Neon', Consolas, 'Courier New', monospace;
            background: transparent;
            color: var(--text-color);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: color 0.3s ease;
        }

        #sidebar {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .header {
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        .section {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            padding: 8px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background-color 0.2s ease, color 0.2s ease;
            color: var(--text-color);
        }

        li:hover {
            background-color: var(--hover-color);
            color: var(--text-color);
        }

        .script-empty {
            color: var(--secondary-text);
            font-style: italic;
            cursor: default;
        }
        .script-empty:hover {
            background-color: transparent;
            color: var(--secondary-text);
        }

        #addBtn {
            background-color: var(--secondary-bg);
            border: none;
            padding: 6px 10px;
            color: var(--text-color);
            margin: 15px;
            border-radius: 12px;
            font-size: 12px;
            font-family: 'Tilt Neon', Consolas, 'Courier New', monospace;
            align-self: flex-start;
            box-sizing: border-box;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.3s ease;
        }

        #addBtn:hover {
            background-color: var(--hover-color);
        }

        .section::-webkit-scrollbar {
            width: 6px;
        }

        .section::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        .section::-webkit-scrollbar-thumb {
            background-color: var(--secondary-text);
            border-radius: 3px;
            transition: background-color 0.3s ease;
        }

        .section::-webkit-scrollbar-thumb:hover {
            background-color: var(--accent-color);
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="header">Workspace</div>
        
        <div class="section" id="scripts">
            <ul id="scriptsList">
                <li class="script-empty">No scripts found.</li>
            </ul>
        </div>
        
        <button id="addBtn">+ Add to Recent</button>
        
        <div class="section" id="recent">
            <ul id="recentList">
                <li class="script-empty">No recent scripts.</li>
            </ul>
        </div>
    </div>

    <script>
        const recentList = document.getElementById('recentList');
        const scriptsList = document.getElementById('scriptsList');
        const addBtn = document.getElementById('addBtn');

        function clearEmptyMessage(listElement) {
            const empty = listElement.querySelector('.script-empty');
            if (empty) empty.remove();
        }

        function addRecentScript(content) {
            clearEmptyMessage(recentList);
            const li = document.createElement('li');
            let label = content.split('\\n')[0].trim();
            if (label.length > 30) label = label.slice(0, 27) + '...';
            li.textContent = label || "Untitled Script";
            li.title = content;
            li.onclick = () => {
                window.chrome.webview.postMessage({
                    type: "loadScriptContent",
                    content: content
                });
            };
            recentList.prepend(li);
        }

        addBtn.onclick = () => {
            window.chrome.webview.postMessage({ type: "requestEditorContent" });
        };

        function populateScriptList(files) {
            scriptsList.innerHTML = '';
            if (!files || files.length === 0) {
                const empty = document.createElement('li');
                empty.classList.add('script-empty');
                empty.textContent = 'No scripts found.';
                scriptsList.appendChild(empty);
                return;
            }

            files.forEach(file => {
                const li = document.createElement('li');
                li.textContent = file;
                li.title = `Load script: ${file}`;
                li.onclick = () => {
                    window.chrome.webview.postMessage({
                        type: "loadScript",
                        name: file
                    });
                };
                scriptsList.appendChild(li);
            });
        }

        function applyTheme(themeData) {
            console.log('Applying theme data:', themeData);
            const html = document.documentElement;

            html.className = '';
            html.style.cssText = '';
            if (typeof themeData === 'string') {
                if (themeData !== 'default') {
                    html.classList.add(`theme-${themeData}`);
                }
            }
            else if (typeof themeData === 'object' && themeData.type === 'custom' && themeData.colors) {
                for (const [key, value] of Object.entries(themeData.colors)) {
                    html.style.setProperty(key, value);
                }
            }
        }

        function setupMessageHandlers() {
            console.log('Setting up message handlers');
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.addEventListener('message', event => {
                    console.log('Received message via chrome.webview:', event.data);
                    handleMessage(event.data);
                });
                console.log('Chrome webview message listener added');
            }
        
            window.addEventListener('message', event => {
                console.log('Received message via window:', event.data);
                handleMessage(event.data);
            });
        }

        function handleMessage(data) {
            if (typeof data === 'string') {
                try {
                    data = JSON.parse(data);
                } catch (e) {
                    console.error('Failed to parse message:', e);
                    return;
                }
            }
            
            console.log('Processing message:', data);
            
            if (data.type === "scriptList" && Array.isArray(data.files)) {
                populateScriptList(data.files);
            } else if (data.type === "recentScript" && typeof data.content === "string") {
                addRecentScript(data.content);
            } else if (data.type === "themeChange" && typeof data.theme !== "undefined") {
                console.log('Applying theme from message:', data.theme);
                applyTheme(data.theme);
            }
        }

        window.applyTheme = applyTheme;

        window.addEventListener('DOMContentLoaded', () => {
            console.log('DOM loaded, setting up handlers');
            setupMessageHandlers();
            
            if (window.chrome?.webview?.postMessage) {
                window.chrome.webview.postMessage({ type: "requestScriptList" });
                console.log('Requested script list');
            } else {
                console.warn('Chrome webview not available');
            }
        });

        window.testTheme = function(theme) {
            applyTheme(theme);
        };
    </script>
</body>
</html>
